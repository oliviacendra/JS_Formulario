<!doctype html>

<html lang="es">
  <head>
    <title>Formulario de compra de entradas</title>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link href="css/styles.css" rel="stylesheet" type="text/css" />
    <script src="js/script.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <section>
      <h1>Compra de entradas</h1>
      <form>
        <label for="nombre">Nombre:</label>
        <input
          type="text"
          id="nombre"
          placeholder="Escribe tu nombre"
          required
        />
        <label for="correo">Correo electrónico:</label>
        <input
          type="email"
          id="correo"
          placeholder="Escribe tu correo"
          required
        />
        <label for="exposicion">Exposición:</label>
        <select id="exposicion">
          <option value="e1">Exposión 1</option>
          <option value="e2">Exposición 2</option>
          <option value="e3">Exposición 3</option>
        </select>
        <label for="numero">Número de entradas:</label>
        <input
          type="number"
          id="numero"
          min="1"
          max="10"
          placeholder="Número de entradas"
          required
        />
        <p>Coste total de las entradas: <span id="coste"></span></p>
        <input type="submit" value="Comprar entradas" />
      </form>
    </section>
    <div id="modal">
      <div>
        <h2>La compra se ha realizado correctamente</h2>
        <ul>
          <li>Nombre: <span id="nom"></span></li>
          <li>Correo electrónico: <span id="corr"></span></li>
          <li>Exposición:<span id="ex"></span></li>
          <li>Número de entradas:<span id="num"></span></li>
          <li>Coste total:<span id="ct"></span></li>
        </ul>
        <button>Aceptar</button>
      </div>
    </div>
  </body>
</html>
